<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>精密ルーン計算</title>
<style>
:root{
  --bg:#04070d;
  --panel:#1f2a3a;
  --panel-deep:#1a2433;
  --field:#061432;
  --field-border:rgba(122,151,198,.24);
  --text:#f5f7fb;
  --muted:#cfd6df;
  --button:#2f67e6;
  --button-active:#4f86ff;
}
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{
  background:radial-gradient(circle at top, #0b1220 0%, #05070c 38%, #020305 100%);
  color:var(--text);
  font-family:-apple-system,BlinkMacSystemFont,"Hiragino Sans","Yu Gothic",sans-serif;
  padding:16px 12px 28px;
  margin:0;
}
.card{
  background:linear-gradient(180deg, rgba(35,47,65,.98) 0%, rgba(28,39,54,.98) 100%);
  padding:18px;
  border-radius:28px;
  max-width:560px;
  margin:auto;
  box-shadow:0 18px 50px rgba(0,0,0,.45), inset 0 0 0 1px rgba(255,255,255,.03);
}
h2{
  margin:4px 0 18px;
  font-size:clamp(28px, 7vw, 40px);
  text-align:left;
  font-weight:800;
  letter-spacing:.01em;
}
.group{margin-top:18px}
.label{
  margin-bottom:10px;
  color:var(--muted);
  font-size:17px;
  font-weight:700;
}
.buttons{
  display:flex;
  flex-wrap:wrap;
  gap:10px;
}
button{
  flex:1 1 calc(50% - 10px);
  min-height:58px;
  padding:12px 14px;
  border-radius:18px;
  border:2px solid rgba(122,151,198,.18);
  background:linear-gradient(180deg, #091736 0%, #06112a 100%);
  color:#edf3ff;
  font-size:17px;
  font-weight:700;
  box-shadow:inset 0 0 0 1px rgba(255,255,255,.02);
}
button.active{
  background:linear-gradient(180deg, #346ae8 0%, #2c60da 100%);
  border-color:rgba(110,155,255,.7);
  color:#fff;
  box-shadow:0 10px 24px rgba(52,106,232,.28), inset 0 1px 0 rgba(255,255,255,.14);
}
input{
  width:100%;
  box-sizing:border-box;
  min-height:72px;
  padding:0 20px;
  border-radius:18px;
  border:2px solid var(--field-border);
  background:linear-gradient(180deg, #081636 0%, #05112a 100%);
  color:#fff;
  margin-top:8px;
  font-size:20px;
  outline:none;
}
input::placeholder{color:#8ea1c3}
#result{
  margin-top:22px;
  padding:18px 20px;
  background:linear-gradient(180deg, #081636 0%, #05112a 100%);
  border:2px solid var(--field-border);
  border-radius:18px;
  line-height:1.85;
  white-space:pre-wrap;
  font-size:18px;
  min-height:120px;
}
.note{
  margin-top:14px;
  color:#b3bfd0;
  font-size:13px;
  line-height:1.7;
  background:rgba(6,20,50,.55);
  border:1px solid rgba(122,151,198,.14);
  border-radius:18px;
  padding:14px 16px;
}
@media (max-width:520px){
  body{padding:12px 10px 24px}
  .card{padding:16px 14px 18px;border-radius:24px}
  button{flex-basis:100%;min-height:62px;font-size:18px}
  input{min-height:66px;font-size:18px}
  #result{font-size:17px}
}
</style>
</head>
<body>
<div class="card">
  <h2>精密のルーン（クリ率）</h2>

  <div class="group">
    <div class="label">ルーン</div>
    <div class="buttons">
      <button onclick="select('rune',0.02,this)">レジェンド</button>
      <button onclick="select('rune',0.03,this)">神話</button>
      <button onclick="select('rune',0.04,this)">不滅</button>
      <button onclick="select('rune',0.05,this)">超越</button>
    </div>
  </div>

  <div class="group">
    <div class="label">ブロ像タイプ</div>
    <div class="buttons">
      <button onclick="select('broType','神話',this)">神話</button>
      <button onclick="select('broType','レジェンド',this)">レジェンド</button>
      <button onclick="select('broType','未所持',this)">未所持</button>
    </div>
    <input id="broInput" type="number" placeholder="ブロ像％ (例: 50)" oninput="calc()">
  </div>

  <div class="group">
    <div class="label">合計ペットLv</div>
    <div class="buttons">
      <button onclick="select('pet',0.02,this)">480以上</button>
      <button onclick="select('pet',0,this)">480未満</button>
    </div>
  </div>

  <div class="group">
    <div class="label">ドラ爺Lv</div>
    <div class="buttons">
      <button onclick="select('dragon',0.04,this)">10</button>
      <button onclick="select('dragon',0.055,this)">20</button>
      <button onclick="select('dragon',0.07,this)">30</button>
      <button onclick="select('dragon',0.085,this)">40</button>
      <button onclick="select('dragon',0.1,this)">50</button>
    </div>
  </div>

  <div class="group">
    <div class="label">パテ猫</div>
    <div class="buttons">
      <button onclick="select('cat',0.15,this)">30未満</button>
      <button onclick="select('cat',0.2,this)">30以上</button>
    </div>
  </div>

  <div id="result">ここに結果が表示されます</div>

  <div class="note">
    ※ 表示はショートカット画像の見た目に近づけています。<br>
    ※ 最終スコア増加量は現在、<b>(1 + 常設 + 遺物効果 + ドラ爺 + ペット合計バフ + ブロ像 + ルーン) × (1 + クリダメ + パテ猫クリダメ)</b> で計算しています。<br>
    ※ 最後の式がショートカットと少し違う場合は、その部分だけ合わせて修正できます。
  </div>
</div>

<script>
let state = {
  rune: 0.03,
  broType: "神話",
  pet: 0.02,
  dragon: 0.07,
  cat: 0.15,
  constant: 0.05,
  relic: 0.04,
  critDamage: 1.5
};

function formatNum(v){
  return Number(v).toFixed(3).replace(/\.0+$/,'').replace(/(\.\d*?)0+$/,'$1');
}

function select(key, value, btn) {
  state[key] = value;
  const parent = btn.parentNode;
  Array.from(parent.children).forEach(b => b.classList.remove("active"));
  btn.classList.add("active");
  calc();
}

function calcBro() {
  const broInput = Number(document.getElementById("broInput").value || 0);
  let bro = broInput * 0.01;
  bro = bro + 1;
  bro = bro * 0.01;
  bro = bro - 0.01;

  let base = 0;
  if (state.broType === "神話") base = 0.04;
  if (state.broType === "レジェンド") base = 0.03;
  if (state.broType === "未所持") base = 0;

  return bro + base;
}

function calc() {
  const bro = calcBro();

  const critRateParts = state.constant + state.relic + state.dragon + state.pet + bro + state.rune;
  const finalScore = (1 + critRateParts) * (1 + state.critDamage + state.cat);

  document.getElementById("result").innerText =
    "常設: " + formatNum(state.constant) + "%\n" +
    "遺物効果: " + formatNum(state.relic) + "%\n" +
    "ドラ爺: " + formatNum(state.dragon) + "%\n" +
    "ペット合計バフ: " + formatNum(state.pet) + "%\n" +
    "クリダメ: " + formatNum(state.critDamage) + "%\n" +
    "パテ猫クリダメ: " + formatNum(state.cat) + "%\n" +
    "ブロ像: " + formatNum(bro) + "%\n" +
    "ルーン: " + formatNum(state.rune) + "%\n" +
    "最終スコア増加量: " + formatNum(finalScore) + "%";
}

window.addEventListener("load", () => {
  const groups = document.querySelectorAll(".buttons");
  groups[0].children[1].classList.add("active");
  groups[1].children[0].classList.add("active");
  groups[2].children[0].classList.add("active");
  groups[3].children[2].classList.add("active");
  groups[4].children[0].classList.add("active");
  document.getElementById("broInput").value = 100;
  calc();
});
</script>
</body>
</html>
